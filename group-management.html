<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>群组管理</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<header class="shell-top">
  <div class="logo-area"><div class="logo">K</div><a href="enterprise-list.html">Kpay CRM</a></div>
  <div class="top-controls"><select><option>地区：香港</option><option>地区：澳门</option><option>地区：新加坡</option></select><select><option>语言：简体中文</option><option>English</option></select><button>⚙️</button><button>🔔</button><div class="user-pill"><div class="avatar">OP</div>Olivia</div></div>
</header>

<div class="layout">
  <aside class="sidebar" id="appSidebar"></aside>
  <main class="main">
    <section class="card" id="groupPage">
      <h3 class="section-title">群组管理</h3>
      <div class="grid-3">
        <div class="field"><label>地区</label><select id="filterRegion"><option value="">全部</option><option>香港</option><option>澳门</option><option>新加坡</option></select></div>
        <div class="field"><label>群组ID</label><input id="filterId" placeholder="请输入群组ID" /></div>
        <div class="field"><label>群组名称</label><input id="filterName" placeholder="请输入群组名称" /></div>
        <div class="field"><label>对象类型</label><select id="filterObjectType"><option value="">全部</option><option value="enterprise">企业</option><option value="store">商铺</option></select></div>
        <div class="field"><label>用途分类</label><select id="filterUsageType"><option value="">全部</option><option value="analytics">统计分析</option><option value="operations">运营处理</option><option value="custom">其他 / 自定义</option></select></div>
        <div class="field"><label>状态</label><select id="filterStatus"><option value="">全部</option><option value="enabled">启用</option><option value="disabled">停用</option></select></div>
      </div>
      <div class="btns"><button class="btn primary" id="queryGroupBtn">查询</button><button class="btn" id="resetGroupBtn">重置</button></div>
    </section>

    <section class="card toolbar">
      <h3 class="section-title" style="margin:0;">群组列表</h3>
      <div class="btns" style="margin:0;"><button class="btn primary" id="addGroupBtn">新增群组</button></div>
    </section>

    <section class="card">
      <div class="table-wrap">
        <table style="min-width:1900px;">
          <thead>
            <tr>
              <th>群组ID</th><th>群组名称</th><th>地区</th><th>对象类型</th><th>用途分类</th><th>状态</th><th>备注</th><th>创建人</th><th>创建时间</th><th>更新人</th><th>更新时间</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="groupTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<div id="groupFormDialog" class="modal-mask hidden">
  <div class="modal-card">
    <h3 class="section-title" id="groupDialogTitle">新增群组</h3>
    <div class="form-grid">
      <div class="field"><label>群组ID</label><input id="groupIdInput" class="readonly" readonly /></div>
      <div class="field"><label>地区 *</label><select id="groupRegion"><option value="">请选择地区</option><option>香港</option><option>澳门</option><option>新加坡</option></select></div>
      <div class="field"><label>对象类型 *</label><select id="groupObjectType"><option value="">请选择对象类型</option><option value="enterprise">企业</option><option value="store">商铺</option></select></div>
      <div class="field"><label>群组名称 *</label><input id="groupName" placeholder="请输入群组名称" /></div>
      <div class="field"><label>用途分类 *</label><select id="groupUsageType"><option value="">请选择用途分类</option><option value="analytics">统计分析</option><option value="operations">运营处理</option><option value="custom">其他 / 自定义</option></select></div>
      <div class="field"><label>排序号</label><input id="groupSortNo" type="number" value="100" /></div>
      <div class="field"><label>状态</label><select id="groupStatus"><option value="enabled">启用</option><option value="disabled">停用</option></select></div>
      <div class="field"><label>备注</label><textarea id="groupRemark" placeholder="请输入备注"></textarea></div>
    </div>
    <div class="btns"><button class="btn" id="cancelGroupFormBtn">取消</button><button class="btn primary" id="saveGroupBtn">保存</button></div>
  </div>
</div>

<div id="timelineDialog" class="modal-mask hidden">
  <div class="modal-card modal-card-sm">
    <h3 class="section-title" id="timelineTitle">群组时间轴</h3>
    <div class="timeline" id="groupTimeline"></div>
    <div class="btns"><button class="btn" id="closeTimelineBtn">关闭</button></div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => {
  renderGlobalSidebar('appSidebar', 'group-management.html');
  initGroupManagementPage();
});
</script>
</body>
</html>
