<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>新增企业</title><link rel="stylesheet" href="assets/styles.css"/></head>
<body>
<header class="shell-top"><div class="logo-area"><div class="logo">K</div><a href="enterprise-list.html">Kpay CRM</a></div><div class="top-controls"><select><option>地区：香港</option></select><select><option>语言：简体中文</option></select><button>⚙️</button><button>🔔</button><div class="user-pill"><div class="avatar">OP</div>Olivia</div></div></header>
<div class="layout"><aside class="sidebar"><div class="menu-group"><div class="menu-title">商户管理</div><ul class="menu-list"><li><a class="active" href="enterprise-list.html">企业管理</a></li></ul></div></aside>
<main class="main with-bottom-space">
<section id="overview" class="card section-anchor"><h3 class="section-title">页面顶部概览区</h3><p class="desc">页面标题：新增企业</p><p class="desc">页面说明：用于创建新的企业主体资料，保存后进入待审核状态</p><div class="kv"><div class="kv-item"><div class="k">当前操作人</div><div class="v">Olivia</div></div><div class="kv-item"><div class="k">上單來源</div><div class="v">CRM</div></div></div></section>
<section class="sticky-nav card"><button class="nav-tag" data-target="overview">企业概览</button><button class="nav-tag" data-target="key">企业主键与关联</button><button class="nav-tag" data-target="name">企业名称信息</button><button class="nav-tag" data-target="biz">企业主体与经营信息</button><button class="nav-tag" data-target="base">企业基础经营数据</button><button class="nav-tag" data-target="contact">企业联系信息</button><button class="nav-tag" data-target="addr">企业地址信息</button><button class="nav-tag" data-target="file">企业文件信息</button><button class="nav-tag" data-target="risk">风控 / 业务信息</button></section>
<section id="key" class="card section-anchor"><h3 class="section-title">企业主键与关联信息区</h3><div class="form-grid"><div class="field"><label>上級公司ID</label><input placeholder="选择后自动回填"/></div><div class="field"><label>上级公司名称</label><input placeholder="选择后自动回填"/></div><div class="field"><label>关联群组</label><select multiple><option>高风险行业</option><option>跨境电商</option><option>重点商户</option></select></div><div class="field"><label>&nbsp;</label><button class="btn">选择企业</button></div></div></section>
<section id="name" class="card section-anchor"><h3 class="section-title">企业名称信息区</h3><div class="form-grid"><div class="field"><label>企業中文名稱</label><input/></div><div class="field"><label>企業中文簡稱</label><input/></div><div class="field"><label>企業英文名稱</label><input/></div><div class="field"><label>企業英文簡稱</label><input/></div><div class="field"><label>企業其它名稱</label><textarea></textarea></div><div class="field"><label>企業所有名稱（中文）</label><textarea></textarea></div><div class="field"><label>企業所有名稱（英文）</label><textarea></textarea></div><div class="field"><label>商業登記證名稱</label><input/></div><div class="field"><label>公司登記証名稱(非必須)</label><input/></div></div></section>
<section id="biz" class="card section-anchor"><h3 class="section-title">企业主体与经营信息区</h3><div class="form-grid"><div class="field"><label>公司模式</label><select><option>直营</option><option>加盟</option><option>连锁</option></select></div><div class="field"><label>是否子公司</label><select><option>是</option><option>否</option></select></div><div class="field"><label>公司結構</label><input/></div><div class="field"><label>行業分類 / 業務性質 / 產品服務</label><input placeholder="三级选择mock"/></div><div class="field"><label>MCC Code</label><input/></div><div class="field"><label>進階MCC Code</label><input/></div><div class="field"><label>special MCC 附件</label><input type="file"/></div><div class="field"><label>小微商戶</label><select><option>是</option><option>否</option></select></div><div class="field"><label>SME 設定</label><input/></div><div class="field"><label>成立日期</label><input type="date"/></div><div class="field"><label>法律地位</label><select><option>有限公司</option></select></div><div class="field"><label>僱員人數</label><input/></div><div class="field"><label>注冊資本</label><input/></div><div class="field"><label>周年申報表 / 法團成立表(非必須)</label><input type="file"/></div><div class="field"><label>企业成立 / 适用法国家</label><input/></div><div class="field"><label>企业治理法律所在国</label><input/></div><div class="field"><label>企业税务申报分类</label><input/></div><div class="field"><label>企业税务业务类型</label><input/></div><div class="field"><label>公司層級</label><input/></div></div></section>
<section id="base" class="card section-anchor"><h3 class="section-title">企业基础经营数据区</h3><div class="form-grid"><div class="field"><label>進件通道(必須)</label><select multiple><option>Adyen-AFP</option><option>Adyen-payfac</option><option>其他</option></select></div><div class="field"><label>每宗交易平均金額</label><input/></div><div class="field"><label>每宗交易最大交易額</label><input/></div><div class="field"><label>預計每年交易宗數</label><input/></div><div class="field"><label>過往拒付比例</label><input/></div><div class="field"><label>拒付平均處理日數</label><input/></div><div class="field"><label>過往退款比例</label><input/></div><div class="field"><label>退款平均處理日數</label><input/></div><div class="field"><label>平均每月營業額</label><input/></div><div class="field"><label>經營方式</label><input/></div><div class="field"><label>提前收款日數</label><input/></div><div class="field"><label>貨物 / 服務最短送達時間</label><input/></div><div class="field"><label>貨物 / 服務最長送達時間</label><input/></div><div class="field"><label>退貨政策</label><textarea></textarea></div><div class="field"><label>退貨政策截圖</label><input type="file"/></div><div class="field"><label>財務報表審計</label><select><option>是</option><option>否</option></select></div><div class="field"><label>經營年限</label><input/></div><div class="field"><label>職稱 / 職位</label><input/></div><div class="field"><label>T1特選商戶</label><select><option>是</option><option>否</option></select></div><div class="field"><label>歸屬國編號</label><input/></div><div class="field"><label>歸屬省編號</label><input/></div></div></section>
<section id="contact" class="card section-anchor"><h3 class="section-title">企业联系信息区</h3><div class="form-grid"><div class="field"><label>公司电话</label><input/></div><div class="field"><label>电邮地址</label><input/></div><div class="field"><label>官网</label><input/></div><div class="field"><label>客服邮箱</label><input/></div></div></section>
<section id="addr" class="card section-anchor"><h3 class="section-title">企业地址信息区</h3><div class="form-grid"><div class="field"><label>注册地址</label><textarea></textarea></div><div class="field"><label>经营地址</label><textarea></textarea></div></div></section>
<section id="file" class="card section-anchor"><h3 class="section-title">企业文件信息区</h3><div class="form-grid"><div class="field"><label>入貨單</label><input type="file"/></div><div class="field"><label>閉路電視錄影</label><input type="file"/></div><div class="field"><label>最高交易金額的客戶單據</label><input type="file"/></div></div></section>
<section id="risk" class="card section-anchor"><h3 class="section-title">风控 / 业务信息区</h3><div class="form-grid"><div class="field"><label>预估风险等级</label><select><option>低</option><option>中</option><option>高</option></select></div><div class="field"><label>业务备注</label><textarea></textarea></div></div></section>
</main></div>
<div class="bottom-actions"><button class="btn">从草稿复制</button><button class="btn">存成草稿</button><button class="btn primary">保存</button><a class="btn" href="enterprise-list.html">取消</a></div>
<script src="assets/app.js"></script>
</body></html>
